<!doctype html>
<html
	class="light"
	lang="ru"

	<head>
		<meta charset="utf-8" />
		<meta

		/>

		<link

							secondary: '#904d00',
							'inverse-surface': '#313030',
							'on-secondary-fixed': '#2f1500',
							error: '#ba1a1a',
							'on-tertiary': '#ffffff',
							'on-primary': '#ffffff',
							'inverse-on-surface': '#f3f0ef',
							'on-tertiary-fixed-variant': '#920703',
							'primary-container': '#feda00',
							'tertiary-fixed-dim': '#ffb4a8',
							tertiary: '#b52619',
							'on-secondary-container': '#603100',
							outline: '#7e775f',
							'on-primary-fixed-variant': '#534600',
							'primary-fixed': '#ffe25c',
							'on-secondary': '#ffffff',
							'on-tertiary-container': '#b7281b',
							'error-container': '#ffdad6',
							'on-surface': '#1c1b1b',
							'on-secondary-fixed-variant': '#6e3900',
							'secondary-fixed': '#ffdcc3',
							'outline-variant': '#cfc6ab',
							'inverse-primary': '#e6c500',
							'secondary-fixed-dim': '#ffb77d',
							'on-tertiary-fixed': '#410000',
							'surface-variant': '#e5e2e1',
							'tertiary-fixed': '#ffdad4',
							'surface-container-high': '#eae7e7',
							'surface-container': '#f0eded',
							'on-error-container': '#93000a',
							'secondary-container': '#fd8b00',
							'surface-dim': '#dcd9d9',

							'container-margin-mobile': '16px',
							'container-margin-desktop': '40px',

							'headline-sm': ['24px', { lineHeight: '1.4', fontWeight: '600' }],
							'body-md': ['16px', { lineHeight: '1.6', fontWeight: '400' }],

								'13px',

									fontWeight: '500'

		</script>
		<style>
			.glass-card {
				background: rgba(255, 255, 255, 0.7);
				backdrop-filter: blur(20px);
				border: 1px solid rgba(255, 218, 212, 0.5);
			}
			.organic-blob {
				position: absolute;
				filter: blur(80px);
				z-index: -1;
				opacity: 0.3;
			}
		</style>
	</head>
	<body
		class="bg-background font-body-md text-on-background min-h-screen overflow-x-hidden flex flex-col items-center justify-center"
	>
		<!-- Ambient Background Blobs -->
		<div
			class="organic-blob bg-tertiary-fixed w-[500px] h-[500px] -top-20 -left-20 rounded-full"
		></div>
		<div
			class="organic-blob bg-primary-fixed w-[400px] h-[400px] bottom-10 -right-20 rounded-full"
		></div>
		<!-- Main Content Container -->
		<main
			class="w-full max-w-4xl px-container-margin-mobile md:px-container-margin-desktop flex flex-col items-center text-center"
		>
			<!-- Illustration Area -->
			<div class="relative w-full mb-12 flex justify-center">
				<div
					class="glass-card p-10 rounded-[40px] shadow-sm relative overflow-hidden group"
				>
					<!-- Large 404 Visual -->
					<div class="relative z-10 flex flex-col items-center">
						<h1
							class="font-display-lg text-[120px] md:text-[200px] leading-none text-tertiary/10 select-none tracking-tighter"
						>
							404
						</h1>
						<div
							class="absolute inset-0 flex items-center justify-center translate-y-4"
						>
							<img
								alt="Abstract ethereal 3D shape"
								class="w-48 md:w-72 h-48 md:h-72 object-contain mix-blend-multiply opacity-80"
								data-alt="A highly detailed 3D abstract sculpture made of warm iridescent glass and soft amber liquid forms. The shape is suspended in a bright, minimalist digital void with high-key studio lighting. The color palette consists of soft burgundy, warm orange, and golden yellow, perfectly matching a premium glassmorphic enterprise UI aesthetic. The mood is calm, modern, and sophisticated."
								src="https://lh3.googleusercontent.com/aida-public/AB6AXuArQO93rTzInW5epVvrC8_KX2ujWZ4gGopRFWnVpinqzTTzJenEf8O6wBdSx51-ccu8zqDNRhN3ck1F4EME0ouXYxO-feqLQ8WXnt9MNaOC6qOyxhzngOFObw509e-wrm59GN-4qbCLTeelEm__uEbEsa-Fhn2aIjNZM6rXWBbpozNrIrLhub2yn1v-UGFGZac0dGgnWU2zPB0QNdx_qJ-qPWFVIWcsEmPMtbpQ1XJxLbZuWPveLqR8qxLal2HVp7IWRZL2uBrhItA"
							/>
						</div>
					</div>
					<!-- Floating Decorative Elements -->
					<div
						class="absolute top-10 right-10 bg-tertiary/20 w-4 h-4 rounded-full blur-sm animate-pulse"
					></div>
					<div
						class="absolute bottom-20 left-10 bg-secondary-container/40 w-8 h-8 rounded-full blur-md opacity-50"
					></div>
				</div>
			</div>
			<!-- Text Content -->
			<div class="space-y-6 max-w-lg">
				<div
					class="inline-flex items-center gap-2 px-4 py-1.5 bg-tertiary-container text-on-tertiary-container rounded-full"
				>
					<span class="material-symbols-outlined text-[18px]">warning</span>
					<span class="font-label-caps text-label-caps tracking-widest">
						Ошибка системы
					</span>
				</div>
				<h2 class="font-headline-md text-headline-md text-on-surface">
					Страница не найдена
				</h2>
				<p class="font-body-lg text-body-lg text-on-surface-variant">
					Извините, запрашиваемая вами страница перемещена или больше не
					существует в ZenAccounting.
				</p>
				<!-- Action Area -->
				<div
					class="pt-8 flex flex-col md:flex-row items-center justify-center gap-4"
				>
					<a
						class="group flex items-center gap-3 bg-secondary text-on-secondary font-bold px-8 py-4 rounded-xl transition-all duration-200 hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-secondary/20"
						href="/"
					>
						<span class="material-symbols-outlined">home</span>
						<span class="font-body-md">Вернуться на главную</span>
					</a>
					<button
						class="flex items-center gap-3 bg-surface-container text-secondary font-bold px-8 py-4 rounded-xl border border-outline-variant/30 transition-all duration-200 hover:bg-surface-container-high active:scale-[0.98]"
						onclick="window.history.back()"
					>
						<span class="material-symbols-outlined">arrow_back</span>
						<span class="font-body-md">Назад</span>
					</button>
				</div>
			</div>
			<!-- Footer Note -->
			<div class="mt-24 pb-8 text-on-surface-variant/60">
				<p class="font-label-caps text-label-caps uppercase tracking-widest">
					© 2026 ZenAccounting • Служба поддержки: help@zenaccounting.ru
				</p>
			</div>
		</main>
		<!-- Micro-interaction Script -->
		<script>
			document.addEventListener('mousemove', e => {
				const x = e.clientX / window.innerWidth - 0.5
				const y = e.clientY / window.innerHeight - 0.5

				const card = document.querySelector('.glass-card')
				const img = card.querySelector('img')
				const h1 = card.querySelector('h1')

				if (card && img && h1) {
					card.style.transform = `perspective(1000px) rotateY(${x * 4}deg) rotateX(${-y * 4}deg)`
					img.style.transform = `translate(${x * 20}px, ${y * 20}px) translateY(16px)`
					h1.style.transform = `translate(${-x * 30}px, ${-y * 30}px)`
				}
			})
		</script>
	</body>
</html>
